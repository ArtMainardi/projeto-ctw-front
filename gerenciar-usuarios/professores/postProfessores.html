<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto CTW+</title>
</head>
<body>
    <header>
        <li><a href="../professores/professores.html">Voltar</a></li>
    </header>

    <main id="error-main">
        <p id="feedback-message"></p>
    </main>

    <main id="main" style="display: none;">
        <h1>Salvar Professores</h1>
        <div class="cad-container">
            <input class="cad-input" id="nome-professor" type="text" placeholder="Nome do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="cadastro-professor" type="text" placeholder="Cadastro do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="nascimento-professor" type="text" placeholder="Data de nascimento do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="cpf-professor" type="text" placeholder="CPF do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="especialidade-professor" type="text" placeholder="Especialidade do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="email-professor" type="text" placeholder="Email do professor">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="senha-professor" type="text" placeholder="Senha do professor (deixe vazio para '1234' automático)">
        </div>
        <div class="cad-container">
            <input class="cad-input" id="adm" type="checkbox" value="true">
            <span>Adm</span>
        </div>
        <button onclick="salvarProfessores(false)">Salvar</button>
        <ul id="feedback"></ul>
    </main>
    
    <script src="./professoresCRUD.js"></script>
</body>
</html>
